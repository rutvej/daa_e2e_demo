version: '3.8'

services:
  # ============ INFRASTRUCTURE ============
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 50mb
      --maxmemory-policy noeviction
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: payflow
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gitea:
    image: gitea/gitea:latest
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=http://localhost:3000
      - GITEA__server__HTTP_PORT=3000
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=false
    ports:
      - "3000:3000"
    volumes:
      - gitea_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============ APPLICATION ============

  payment-api:
    build:
      context: ./payment-api
    restart: always
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://payflow:payflow_secret@postgres/payflow?sslmode=disable
      - RABBITMQ_HOST=rabbitmq
      - DAA_BACKEND_API_URL=http://host.docker.internal:8000
      - DAA_LOGS_URL=http://host.docker.internal:8000/logs/
      - DAA_TOKEN=${DAA_TOKEN_PAYMENT_API}
      - REPO_NAME=payment-api
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  payment-worker:
    build:
      context: ./payment-worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://payflow:payflow_secret@postgres/payflow?sslmode=disable
      - RABBITMQ_HOST=rabbitmq
      - DAA_BACKEND_API_URL=http://host.docker.internal:8000
      - DAA_TOKEN=${DAA_TOKEN_PAYMENT_WORKER}
      - REPO_NAME=payment-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  gitea_data:
